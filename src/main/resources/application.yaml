spring:
  application:
    name: WP-AI
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4.1-mini

wpai:
  embedding:
    model: text-embedding-3-small

  sources:

    - id: sample
      knowledgeBaseId: petclinic-kb
      name: Spring PetClinic
      type: SAMPLE
      location: C:/DC/spring-petclinic

